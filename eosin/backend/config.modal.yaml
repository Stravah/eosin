pipeline:
  maas:
    enabled: false
  ocr_api:
    api_host: 127.0.0.1
    api_port: 8000
    model: default
    api_path: /v1/chat/completions
    verify_ssl: false
    connection_pool_size: 128
    request_timeout: 180
    retry_max_attempts: 0
  max_workers: 128
  page_loader:
    max_tokens: 3072
    pdf_dpi: 200
    task_prompt_mapping:
      table: "Return exactly one valid HTML <table> for the transaction table only. No markdown, no prose, no explanation, and no surrounding text. Preserve row and column order."
    pdf_verbose: true
  logging:
    level: DEBUG
  layout:
    batch_size: 4
    model_dir: PaddlePaddle/PP-DocLayoutV3_safetensors
